<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بدون إنترنت</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1d4ed8, #7c3aed);
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 24px;
      max-width: 420px;
    }

    h1 {
      margin-top: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>أنت الآن بدون إنترنت</h1>
    <p>إذا كنت قد فتحت التطبيق سابقاً، سيستمر بالعمل أوفلاين.</p>
  </div>
</body>
</html>
